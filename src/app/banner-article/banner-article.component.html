
<section class="container mx-auto px-4 xl:px-12 flex flex-col gap-6 lg:gap-10">
    <div class="lg:w-[60%] mx-auto text-center space-y-3">
        <p class="uppercase tracking-[0.2em] text-accent dark:text-accent-dark text-xs font-bold">Resources</p>
        <h2 class="text-2xl sm:text-3xl font-bold">{{data.Title}}</h2>
        <p class="text-base sm:text-lg text-blue-600 dark:text-blue-400 leading-relaxed">{{data.Subtitle}}</p>
    </div>
    <div [ngClass]="{'lg:grid-cols-2': data.Articles.length == 2, 'lg:grid-cols-3' : data.Articles.length >= 3, 'justify-items-center lg:w-1/2 lg:mx-auto' : data.Articles.length == 1}" class="grid grid-cols-1 gap-8">
        <ng-container *ngFor="let article of data?.Articles">
            <a
                [href]="article?.File?.src"
                target="_blank"
                rel="noopener noreferrer"
                [attr.aria-label]="article?.Title ? 'Open ' + article?.Title + ' resource in a new tab' : 'Open resource in a new tab'"
                class="group rounded-2xl scale-card relative overflow-hidden shadow-lg hover:shadow-xl transition-shadow duration-300 w-full border border-blue-200 dark:border-blue-700"
            >
                <div class="relative !overflow-hidden min-h-[300px] lg:min-h-[400px] rounded-2xl text-white">
                    <img [src]="article?.Image?.src" [alt]="article?.Image?.alt" class="absolute w-full h-full object-cover inset-0 transition-transform duration-500 group-hover:scale-105" />
                    <div class="absolute inset-0 bg-black/40 group-hover:bg-black/55 transition-all duration-300"></div>
                    <div class="absolute rounded-inherit img-overlay h-full inset-0"></div>
                    <div class="absolute inset-0 z-10 h-full">
                        <div class="flex flex-col justify-between h-full p-6">
                            <div class="self-end text-sm font-medium text-[#c7c7cc]">{{article?.File?.date}}</div>
                            <div class="space-y-6">
                                <div class="space-y-3">
                                    <h4 class="font-bold text-xl !text-[#faf8f5] lg:text-3xl leading-snug">{{article.Title}}</h4>
                                    <h5 class="text-base lg:text-lg !text-[#c7c7cc]">{{article?.Subtitle}}</h5>
                                </div>
                                <div class="font-bold uppercase text-xs tracking-wider px-4 py-1.5 rounded-md bg-accent/80 text-[#faf8f5] w-fit">{{article?.File?.extension}}</div>
                            </div>
                        </div>
                    </div>
                </div>
            </a>
        </ng-container>
    </div>
</section>
