<section class="px-4">
  <div
    class="max-w-sm mx-auto bg-blue-100 dark:bg-blue-800 shadow-md rounded-2xl overflow-hidden border border-blue-200 dark:border-blue-700"
  >
    <div class="px-5 py-4 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-accent dark:bg-accent-dark animate-pulse"></div>
        <h3 class="text-sm font-bold uppercase tracking-wider">In Progress</h3>
      </div>
      <svg
        stroke-width="2"
        stroke="currentColor"
        viewBox="0 0 24 24"
        fill="none"
        class="h-5 w-5 text-blue-600 dark:text-blue-300"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          stroke-linejoin="round"
          stroke-linecap="round"
        ></path>
      </svg>
    </div>
    <div class="px-5 pb-5">
      <div class="w-full bg-blue-200 dark:bg-blue-700 rounded-full h-2">
        <div
          [style.width]="progressCard?.percent"
          class="bg-accent dark:bg-accent-dark h-2 rounded-full transition-all duration-500"
        ></div>
      </div>
      <div class="flex justify-between items-center mt-3">
        <span class="text-xs font-medium text-blue-600 dark:text-blue-300 tracking-wide"
          >{{ progressCard?.percent }} Complete</span
        >
      </div>
    </div>
  </div>
</section>
