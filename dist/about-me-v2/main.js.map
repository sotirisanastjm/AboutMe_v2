<section class="container mx-auto">
    <div class="flex flex-col">
        <p class="self-center uppercase tracking-[0.2em] text-accent dark:text-accent-dark text-sm font-bold mb-3">Technologies</p>
        <h3 class="self-center font-bold text-2xl md:text-3xl mb-12">My Skills</h3>
        <div class="mx-4 gap-4 md:gap-8 grid grid-cols-3 md:grid-cols-6 justify-items-center w-fit self-center">
            <div class="tooltip" *ngFor="let skill of skillsList">
                <app-svg-list [svg]="skill.svg"></app-svg-list>
                <div class="tooltiptext">{{ skill.name }}</div>
            </div>
        </div>
    </div>
</section>
