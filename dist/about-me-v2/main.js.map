<nav aria-label="Main navigation">
    <div class="dark:bg-[#0f0f0f] bg-[#faf8f5] border-b border-[#e5e5ea] dark:border-[#1c1c1e]">
        <div class="flex flex-row items-center py-5 px-4 justify-between container mx-auto">
            <div>
                <!-- Logo -->
                <a aria-label="Home page" (click)="toggleMenu(true)" routerLink="/">
                    <div>
                        <div class="flex flex-row font-black text-xl tracking-tight">
                            <div class="dark:text-blue-200 text-blue-900 self-center">ANAST</div>
                            <div class="ml-1 px-2 py-0.5 rounded-md bg-accent dark:bg-accent-dark text-white dark:text-blue-900 text-sm font-bold self-center">.dev</div>
                        </div>
                    </div>
                </a>
            </div>

<!-- Nav -->
            <div class="md:block hidden">
                <ul class="md:flex md:space-x-10 uppercase font-bold text-sm tracking-[0.15em] text-blue-700 dark:text-blue-400">
                  <li><a aria-label="Home Page" class="textNav textShadow" routerLink="/">Home</a></li>
                  <li><a aria-label="Projects Page" class="textNav textShadow" routerLink="/projects">Projects</a></li>
                  <li><a aria-label="CV Page" class="textNav textShadow" routerLink="/cv">CV</a></li>
                  <!-- <li><a aria-label="Contact form Page" class="textNav textShadow" routerLink="/contact">Contact</a></li> -->
                </ul>
            </div>
            <div class="md:block hidden">
                <label for="darkMode1" class="darkSwitch">
                    <span class="sr-only"> Dark Mode</span>
                    <input id="darkMode1" (change)="toggleDarkMode()" type="checkbox" [checked]="isDarkMode" aria-label="Toggle dark mode">
                    <span class="switchSlider"></span>
                </label>
            </div>
            <button
                type="button"
                (click)="toggleMenu()"
                aria-label="Toggle menu"
                aria-controls="mobile-navigation"
                [attr.aria-expanded]="menuState === 'open'"
                class="md:hidden block"
            >
                <span [ngClass]="{'rotate-45 origin-bottom-left ease-linear duration-200 ': menuState === 'open','origin-top-left ease-linear duration-100': menuState === 'closed'}" class="block w-7 h-[2px] bg-blue-700 dark:bg-blue-400"></span>
                <span [ngClass]="{'opacity-0 duration-100': menuState === 'open','opacity-1 duration-100': menuState === 'closed'}" class="mt-2 block w-7 h-[2px] bg-blue-700 dark:bg-blue-400"></span>
                <span [ngClass]="{'-rotate-45 origin-top-left ease-linear duration-200': menuState === 'open', ' origin-bottom-left ease-linear duration-100': menuState === 'closed'}" class="mt-2 block w-7 h-[2px] bg-blue-700 dark:bg-blue-400"></span>
            </button>
        </div>
    </div>
    
<!-- Mobile Menu Slide -->

    <div
        id="mobile-navigation"
        [attr.aria-hidden]="menuState === 'closed'"
        [ngClass]="{'translate-x-0': menuState === 'open', 'translate-x-full': menuState === 'closed'}"
        class="md:hidden fixed right-0 menuHeight w-[100%] dark:bg-[#0a0a0a] bg-[#faf8f5] transform transition-transform ease-in-out duration-300 z-50"
    >
        <div class="flex flex-col justify-evenly text-center items-center h-full">
            <div class="md:h-[60%]">
                <ul class="space-y-6 md:space-y-10 uppercase font-bold text-2xl tracking-[0.1em] text-blue-700 dark:text-blue-400">
                  <li><a (click)="toggleMenu()" class="textNav textShadow" routerLink="/">Home</a></li>
                  <li><a (click)="toggleMenu()" class="textNav textShadow" routerLink="/projects">Projects</a></li>
                  <li><a (click)="toggleMenu()" class="textNav textShadow" routerLink="/cv">CV</a></li>
                  <!-- <li><button (click)="toggleMenu()" class="textNav textShadow" routerLink="/contact">Contact</button></li> -->
                </ul>
            </div>
            <div>
                <app-media></app-media>
            </div>
            <label for="darkMode2" class="darkSwitch">
                <span class="sr-only"> Dark Mode</span>
                <input id="darkMode2" (change)="toggleDarkMode()" type="checkbox" [checked]="isDarkMode" aria-label="Toggle dark mode">
                <span class="switchSlider"></span>
            </label>
        </div>
    </div>

</nav>
